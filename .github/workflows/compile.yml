name: Compile Lecture Notes

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Triggers a dynamic build release when a version tag like v1.0.0 is pushed
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install TeX Live and Tufte Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-science latexmk

      - name: Compile Master Lecture Notes
        run: |
          # Compiles the core master file which dynamically pulls in all nested subfiles
          latexmk -pdf -interaction=nonstopmode master-handout.tex

      - name: Compile Individual Lecture Standalones
        run: |
          # Iterates through nested subfolders to compile standalone individual notes
          find lectures/ -name "*.tex" ! -name "template.tex" -exec sh -c 'cd "$(dirname "{}")" && latexmk -pdf -interaction=nonstopmode "$(basename "{}")"' \;

      - name: Upload PDF Artifacts (Direct Browser View)
        uses: actions/upload-artifact@v4
        with:
          name: ECE486-687-Compiled-Handouts
          path: "**/*.pdf"
          if-no-files-found: error
          # Retaining unarchived format lets students open the PDF directly inside their web browser
          archive: false 

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install TeX Live and Tufte Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-science latexmk

      - name: Re-compile Clean Master Textbook for Release
        run: latexmk -pdf -interaction=nonstopmode master-handout.tex

      - name: Rename PDF for Production Distribution
        run: mv master-handout.pdf ECE486_687_Robot_Dynamics_and_Control_Course_Notes.pdf

      - name: Create Production GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ECE486_687_Robot_Dynamics_and_Control_Course_Notes.pdf
          body: |
            **ECE 486 / ECE 687 Course Notes Production Release**
            
            This release contains the compiled course notes generated directly from repository source files.
            
            Download **`ECE486_687_Robot_Dynamics_and_Control_Course_Notes.pdf`** below for a study copy.
          draft: false
          prerelease: false
